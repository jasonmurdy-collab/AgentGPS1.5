<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent GPS</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3e%3cdefs%3e%3clinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3e%3cstop offset='0%25' style='stop-color:%233B82F6;stop-opacity:1' /%3e%3cstop offset='100%25' style='stop-color:%2338B2AC;stop-opacity:1' /%3e%3c/linearGradient%3e%3c/defs%3e%3cpath d='M50 15 L58 42 L85 50 L58 58 L50 85 L42 58 L15 50 L42 42 Z' fill='url(%23grad)' /%3e%3c/svg%3e"
    />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Roboto:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Light theme (default) */
      :root {
        --font-heading: "Poppins", sans-serif;
        --font-body: "Roboto", sans-serif;

        --color-bg: #f8f9fa;
        --color-surface: #ffffff;
        --color-text-primary: #1a202c;
        --color-text-secondary: #4a5568;
        --color-primary: #b40101;
        --color-on-primary: #ffffff;
        --color-secondary: #333333;
        --color-accent-bg: #f5f5f5;
        --color-accent: #3b82f6; /* A vibrant blue for great contrast in both themes */
        --color-accent-text: #ffffff;
        --color-accent-secondary: #38b2ac;
        --color-border: #e2e8f0;
        --color-input-bg: #edf2f7;
        --color-destructive: #e53e3e;
        --color-on-destructive: #ffffff;
        --color-destructive-surface: #fed7d7;
        --color-success: #38a169;
        --color-on-success: #ffffff;
        --color-success-surface: #c6f6d5;
        --color-warning: #d69e2e;
        --color-on-warning: #1a202c;
        --color-warning-surface: #feebc8;
      }

      /* Dark theme */
      html.dark {
        --color-bg: #1a202c;
        --color-surface: #2d3748;
        --color-text-primary: #f7fafc;
        --color-text-secondary: #a0aec0;
        --color-accent-bg: #2d3748;
        --color-accent-secondary: #4fd1c5;
        --color-border: #4a5568;
        --color-input-bg: #4a5568;
        --color-destructive: #fc8181;
        --color-on-destructive: #1a202c;
        --color-destructive-surface: #4a2121;
        --color-success: #68d391;
        --color-on-success: #1a202c;
        --color-success-surface: #254e38;
        --color-warning: #f6e05e;
        --color-on-warning: #1a202c;
        --color-warning-surface: #544214;
      }

      html,
      body,
      #root {
        height: 100%;
      }
      body {
        font-family: var(--font-body);
        background-color: var(--color-bg);
        color: var(--color-text-primary);
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-heading {
        font-family: var(--font-heading);
      }
      html.dark .logo-img {
        filter: brightness(0) invert(1)
          drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: "var(--color-text-primary)",
                  a: {
                    color: "var(--color-accent)",
                    "&:hover": {
                      color: "var(--color-accent-secondary)",
                    },
                  },
                  h1: { color: "var(--color-text-primary)" },
                  h2: { color: "var(--color-text-primary)" },
                  h3: { color: "var(--color-text-primary)" },
                  h4: { color: "var(--color-text-primary)" },
                  strong: { color: "var(--color-text-primary)" },
                  blockquote: {
                    color: "var(--color-text-secondary)",
                    borderLeftColor: "var(--color-border)",
                  },
                  "ol > li::before": {
                    color: "var(--color-text-secondary)",
                  },
                  "ul > li::before": {
                    backgroundColor: "var(--color-text-secondary)",
                  },
                },
              },
            }),
            fontFamily: {
              sans: ["var(--font-body)", "sans-serif"],
              heading: ["var(--font-heading)", "sans-serif"],
            },
            colors: {
              background: "var(--color-bg)",
              surface: "var(--color-surface)",
              "text-primary": "var(--color-text-primary)",
              "text-secondary": "var(--color-text-secondary)",
              primary: ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-primary, var(--color-accent)) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-primary, var(--color-accent))",
              secondary: ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-secondary, var(--color-accent-secondary)) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-secondary, var(--color-accent-secondary))",
              accent: ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-accent) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-accent)",
              "on-accent": "var(--color-on-primary, var(--color-accent-text))",
              "accent-secondary": ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-accent-secondary) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-accent-secondary)",
              border: "var(--color-border)",
              input: "var(--color-input-bg)",
              destructive: ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-destructive) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-destructive)",
              "on-destructive": "var(--color-on-destructive)",
              "destructive-surface": "var(--color-destructive-surface)",
              success: ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-success) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-success)",
              "on-success": "var(--color-on-success)",
              "success-surface": "var(--color-success-surface)",
              warning: ({ opacityValue }) =>
                opacityValue
                  ? `color-mix(in srgb, var(--color-warning) ${parseFloat(opacityValue) * 100}%, transparent)`
                  : "var(--color-warning)",
              "on-warning": "var(--color-on-warning)",
              "warning-surface": "var(--color-warning-surface)",
            },
          },
        },
      };
    </script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.5",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.552.0",
          "firebase/": "https://aistudiocdn.com/firebase@^12.5.0/",
          "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
          "jspdf": "https://aistudiocdn.com/jspdf@^3.0.3",
          "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
          "marked": "https://aistudiocdn.com/marked@^16.4.1",
          "dompurify": "https://aistudiocdn.com/dompurify@^3.3.0",
          "vite": "https://aistudiocdn.com/vite@^7.1.12",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.0",
          "@tiptap/react": "https://esm.sh/@tiptap/react@2.2.4?external=react,react-dom",
          "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@2.2.4",
          "@tiptap/extension-link": "https://esm.sh/@tiptap/extension-link@2.2.4",
          "@tiptap/extension-underline": "https://esm.sh/@tiptap/extension-underline@2.2.4",
          "@tiptap/extension-placeholder": "https://esm.sh/@tiptap/extension-placeholder@2.2.4"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
